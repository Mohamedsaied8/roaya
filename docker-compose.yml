version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "9090:8080"
      - "8081:8081"
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - SFU_URL=http://sfu:3000
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
    ports:
      - "8082:80"
      - "8443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=roaya
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Migrations in this directory run in lexical order on first container
      # start, so 001_initial_schema.sql then 002_rooms_sessions_recordings.sql.
      - ./backend/scripts/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  sfu:
    build:
      context: ./sfu
    ports:
      - "41000-41100:41000-41100/udp"
      - "41000-41100:41000-41100/tcp"
    environment:
      - NODE_ENV=development
      - SFU_ANNOUNCED_IP=${SFU_ANNOUNCED_IP:-127.0.0.1}

volumes:
  postgres_data:
