version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=roaya
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  sfu:
    image: alpine
    command: ["echo", "SFU Worker placeholder"]

volumes:
  postgres_data:
